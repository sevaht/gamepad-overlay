<!DOCTYPE html>
<html>
    <head>
        <title>Gamepad Overlay</title>
        <style>
            body {
                margin: 0;
                background: none;
            }

            #overlayRoot {
                display: block;
                --btn-idle: rgba(44, 47, 51, 0.7);
                --btn-pressed: #3f8cff;
                --overlay-border-inner-size: 4;
                --overlay-border-outer-size: 4;
            }

            .outer-border {
                fill: none;
                stroke: white;
                stroke-width: calc((var(--overlay-border-inner-size) + (var(--overlay-border-outer-size) * 2)) * 1px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .gamepad-button {
                fill: var(--btn-idle, rgba(44, 47, 51, 0.7));
                stroke: black;
                stroke-width: 0;
            }

            .gamepad-button-bordered {
                stroke-width: calc(var(--overlay-border-inner-size) * 1px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .black-border-stroke {
                fill: none;
                stroke: black;
                stroke-width: calc(var(--overlay-border-inner-size) * 1px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .gamepad-button-pressed-fill {
                fill: var(--btn-pressed, #c00);
                stroke: none;
            }

            .gamepad-button.is-pressed {
                fill: var(--btn-pressed, #c00);
            }

            #overlayRoot [data-role="analog-area"] {
                --btn-idle: rgba(0, 0, 0, 1);
            }

        </style>
        <script src="overlay-core.js"></script>
        <script src="overlay-domain.js"></script>
        <script src="svg-shapes.js"></script>
        <script src="gamepad-input-sources.js"></script>
    </head>
    <body>
        <svg id="overlayRoot"></svg>
        <script defer>
            const QUERY = new URLSearchParams(window.location.search);
            const INPUT_SOURCE = (() => {
                const source = (QUERY.get("source") || "websocket").toLowerCase();
                if (source === "ws") {
                    return "websocket";
                }
                return ["browser", "websocket", "demo"].includes(source) ? source : "browser";
            })();

            const context = new SvgContext(document.getElementById("overlayRoot"));
            const THEME_PRESETS = {
                xbox: {
                    global: {},
                    "right:up": {"--btn-idle": "rgba(95, 95, 31, 0.7)", "--btn-pressed": "#ffff33"},
                    "right:right": {"--btn-idle": "rgba(95, 31, 31, 0.7)", "--btn-pressed": "#ff3333"},
                    "right:left": {"--btn-idle": "rgba(31, 31, 95, 0.7)", "--btn-pressed": "#3377ff"},
                    "right:down": {"--btn-idle": "rgba(31, 79, 32, 0.7)", "--btn-pressed": "#3fcf3f"},
                },
                snes: {
                    global: {},
                    "right:up": {"--btn-idle": "rgba(32, 32, 79, 0.7)", "--btn-pressed": "#5555ff"},
                    "right:right": {"--btn-idle": "rgba(79, 32, 32, 0.7)", "--btn-pressed": "#ff5555"},
                    "right:down": {"--btn-idle": "rgba(79, 79, 32, 0.7)", "--btn-pressed": "#ffff55"},
                    "right:left": {"--btn-idle": "rgba(32, 79, 32, 0.7)", "--btn-pressed": "#55ff55"},
                },
            };

            const theme = (QUERY.get("theme") || "xbox").toLowerCase();
            const digitalRenderMode = QUERY.get("digitalRenderMode") === "class" ? "class-toggle" : "fill";
            const prewarmPressFillVisuals = QUERY.get("prewarmPressVisuals") !== "0";
            const themeVariables = THEME_PRESETS[theme] || THEME_PRESETS.xbox;
            const overlay = new GamepadOverlay({
                context,
                buttonLength: 132,
                buttonWidth: 132,
                topLeft: new Vector2({x: 0, y: 0}),
                gap: 1,
                betweenHalvesGap: 0,
                digitalThreshold: 0.55,
                digitalRenderMode,
                prewarmPressFillVisuals,
                themeVariables,
                hasAnalogStick: true,
                /*leftSide: {cornerButtons: {leftTrigger: {pressMode: "digital"}}},
                rightSide: {cornerButtons: {rightTrigger: {pressMode: "digital"}}},*/
            });

            const overlayRegion = overlay.region;
            context.svg.setAttribute("viewBox", `${overlayRegion.topLeft.x} ${overlayRegion.topLeft.y} ${overlay.width} ${overlay.height}`);
            context.svg.setAttribute("width", String(overlay.width));
            context.svg.setAttribute("height", String(overlay.height));

            const sourceStatus = {
                source: INPUT_SOURCE.toUpperCase(),
                pad: "WAIT",
                connected: false,
                lastUpdateMs: 0,
                selectedPadLabel: "none",
                listedPadsText: "",
            };

            const renderer = new GamepadOverlayRenderer({
                overlay,
                sourceStatus,
                deadzoneMode: "none",
                fixedDeadzone: 0.0,
            });

            const source = createGamepadSource({
                mode: INPUT_SOURCE,
                wsUrl: `ws://${QUERY.get("wsHost") || "localhost"}:8765/gamepad-overlay`,
                pollMs: Math.max(1, Math.round(1000 / Math.max(1, Number.parseInt(QUERY.get("poll") || "240", 10)))),
                padIndex: QUERY.get("padIndex") == null ? null : Math.max(0, Number.parseInt(QUERY.get("padIndex"), 10) || 0),
                padIdContains: (QUERY.get("padIdContains") || "").trim(),
                padRequireStandard: QUERY.get("padRequireStandard") === "1",
                listPads: QUERY.get("pads") === "1" || QUERY.get("listPads") === "1",
                onState: (state) => renderer.applyState(state),
                onStatus: (patch) => Object.assign(sourceStatus, patch),
            });
            source.start();
        </script>
    </body>
</html>
