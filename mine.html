<!DOCTYPE html>
<html>
    <head>
        <title>Gamepad Overlay</title>
        <style>
            body {
                background: black;
            }

            #overlayRoot {
                /* border: 1px solid red; */
                --btn-idle: rgba(44, 47, 51, 0.7);
                --btn-pressed: #3f8cff;
                --overlay-border-inner-size: 4;
                --overlay-border-outer-size: 4;
            }

            .outer-border {
                fill: none;
                stroke: white;
                stroke-width: calc((var(--overlay-border-inner-size) + var(--overlay-border-outer-size)) * 2px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .inner-border {
                fill: none;
                stroke: black;
                stroke-width: calc(var(--overlay-border-inner-size) * 2px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .gamepad-button {
                fill: var(--btn-idle, rgba(0,0,0,0.2));
                stroke: black;
                stroke-width: 0;
            }

            .gamepad-button-pressed-fill {
                fill: var(--btn-pressed, #c00);
                stroke: none;
            }

            #overlayRoot [data-role="analog-area"] {
                --btn-idle: black;
            }

            #overlayRoot.theme-xbox [data-side="right"][data-role="up"] {
                --btn-idle: #5f5f1f;
                --btn-pressed: #ffff33;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="right"] {
                --btn-idle: #5f1f1f;
                --btn-pressed: #ff3333;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="left"] {
                --btn-idle: #1f1f5f;
                --btn-pressed: #3377ff;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="down"] {
                --btn-idle: #1f4f20;
                --btn-pressed: #3fcf3f;
            }

            #overlayRoot.theme-snes [data-side="right"][data-role="up"] {
                --btn-idle: #20204f;
                --btn-pressed: #5555ff;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="right"] {
                --btn-idle: #4f2020;
                --btn-pressed: #ff5555;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="down"] {
                --btn-idle: #4f4f20;
                --btn-pressed: #ffff55;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="left"] {
                --btn-idle: #204f20;
                --btn-pressed: #55ff55;
            }
        </style>
        <script src="svg-shapes.js"></script>
    </head>
    <body>
        <svg id="overlayRoot" class="theme-xbox">
        </svg>
        <script defer>
            const context = new SvgContext(document.getElementById('overlayRoot'));
            const overlay = new GamepadOverlay({
                context,
                buttonLength: 132,
                buttonWidth: 132,
                topLeft: new Vector2({x: 0, y: 0}),
                gap: 1,
                betweenHalvesGap: 0,
                digitalThreshold: 0.55,
                hasAnalogStick: true,
                /*leftSide: {
                    cornerButtons: {
                        leftTrigger: {
                            pressMode: "digital",
                        },
                    },
                },
                rightSide: {
                    cornerButtons: {
                        rightTrigger: {
                            pressMode: "digital",
                        },
                    },
                },*/
            });
            const overlayRegion = overlay.region;
            context.svg.setAttribute(
                "viewBox",
                `${overlayRegion.topLeft.x} ${overlayRegion.topLeft.y} ${overlay.width} ${overlay.height}`,
            );
            context.svg.setAttribute("width", String(overlay.width));
            context.svg.setAttribute("height", String(overlay.height));

            const leftStick = overlay.entities.left.entities.analogStick;
            const rightStick = overlay.entities.right.entities.analogStick;
            const leftStickRing = overlay.entities.left.entities.analogStickRing;
            const rightStickRing = overlay.entities.right.entities.analogStickRing;
            const rightTrigger = overlay.entities.right.entities.rightTrigger;
            const leftTrigger = overlay.entities.left.entities.leftTrigger;
            const leftButtons = {
                up: overlay.entities.left.entities.upButton,
                left: overlay.entities.left.entities.leftButton,
                down: overlay.entities.left.entities.downButton,
                right: overlay.entities.left.entities.rightButton,
            };
            leftStick.setPressFillDirection(PressFillDirection.OUTWARD).enablePressVisual();
            rightStick.setPressFillDirection(PressFillDirection.OUTWARD).enablePressVisual();
            leftStickRing.bringLayersToFront();
            rightStickRing.bringLayersToFront();

            const rightButtons = {
                up: overlay.entities.right.entities.upButton,
                left: overlay.entities.right.entities.leftButton,
                down: overlay.entities.right.entities.downButton,
                right: overlay.entities.right.entities.rightButton,
            };

            const cornerButtons = Object.fromEntries(
                Object.entries({
                    leftBumper: overlay.entities.left.entities.leftBumper,
                    select: overlay.entities.left.entities.select,
                    start: overlay.entities.right.entities.start,
                    rightBumper: overlay.entities.right.entities.rightBumper,
                }).filter(([, entity]) => entity != null),
            );

            function startRandomizedInputDemo() {
                const leftButtonHoldFrames = {up: 0, left: 0, down: 0, right: 0};
                const rightButtonHoldFrames = {up: 0, left: 0, down: 0, right: 0};
                const cornerButtonHoldFrames = Object.fromEntries(
                    Object.keys(cornerButtons).map((key) => [key, 0]),
                );
                const leftStickState = {x: 0, y: 0, targetX: 0, targetY: 0};
                const rightStickState = {x: 0, y: 0, targetX: 0, targetY: 0};
                const triggerState = {
                    left: {value: 0, target: 0},
                    right: {value: 0, target: 0},
                };

                function maybeRetargetStick(stickState) {
                    if (Math.random() > 0.96) {
                        stickState.targetX = Math.random() * 2 - 1;
                        stickState.targetY = Math.random() * 2 - 1;
                    }
                }

                function stepTowardTarget(state, rate) {
                    state.x += (state.targetX - state.x) * rate;
                    state.y += (state.targetY - state.y) * rate;
                }

                function maybeRetargetTrigger(trigger) {
                    if (Math.random() > 0.965) {
                        trigger.target = Math.random();
                    }
                }

                function stepTrigger(trigger, rate) {
                    trigger.value += (trigger.target - trigger.value) * rate;
                }

                function updateDigitalPresses(buttonMap, holdMap, triggerChance) {
                    for (const role of Object.keys(buttonMap)) {
                        if (holdMap[role] > 0) {
                            holdMap[role] -= 1;
                            buttonMap[role].setInputAmount(1);
                            continue;
                        }
                        if (Math.random() > triggerChance) {
                            holdMap[role] = 12 + Math.floor(Math.random() * 16);
                            buttonMap[role].setInputAmount(1);
                        } else {
                            buttonMap[role].setInputAmount(0);
                        }
                    }
                }

                function animateRandomizedInputDemo() {
                    maybeRetargetStick(leftStickState);
                    maybeRetargetStick(rightStickState);
                    stepTowardTarget(leftStickState, 0.09);
                    stepTowardTarget(rightStickState, 0.09);

                    leftStick.setTranslation(clampNormalizedOffsetToEllipse({
                        offset: {x: leftStickState.x, y: leftStickState.y},
                        halfSize: overlay.leftAnalogClampHalfSize,
                    }));
                    rightStick.setTranslation(clampNormalizedOffsetToEllipse({
                        offset: {x: rightStickState.x, y: rightStickState.y},
                        halfSize: overlay.rightAnalogClampHalfSize,
                    }));

                    maybeRetargetTrigger(triggerState.left);
                    maybeRetargetTrigger(triggerState.right);
                    stepTrigger(triggerState.left, 0.14);
                    stepTrigger(triggerState.right, 0.14);
                    leftTrigger.setInputAmount(triggerState.left.value);
                    rightTrigger.setInputAmount(triggerState.right.value);

                    const leftStickPress = Math.min(1, Math.hypot(leftStickState.x, leftStickState.y));
                    const rightStickPress = Math.min(1, Math.hypot(rightStickState.x, rightStickState.y));
                    leftStick.setInputAmount(leftStickPress);
                    rightStick.setInputAmount(rightStickPress);

                    updateDigitalPresses(leftButtons, leftButtonHoldFrames, 0.985);
                    updateDigitalPresses(rightButtons, rightButtonHoldFrames, 0.985);
                    updateDigitalPresses(cornerButtons, cornerButtonHoldFrames, 0.992);

                    requestAnimationFrame(animateRandomizedInputDemo);
                }

                requestAnimationFrame(animateRandomizedInputDemo);
            }

            startRandomizedInputDemo(); // comment out to disable demo
        </script>
    </body>
</html>
