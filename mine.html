<!DOCTYPE html>
<html>
    <head>
        <title>Gamepad Overlay</title>
        <style>
            body {
                background: lightblue;
            }

            #overlayRoot {
                border: 1px solid red;  /* temporary for development */ 
                width: 800px;
                height: auto;
            }

            .outer-border {
                fill: none;
                stroke: white;
                stroke-width: 4; /* 2 outward total */
            }

            .inner-border {
                fill: none;
                stroke: black;
                stroke-width: 2; /* 1 outward */
            }

            .gamepad-button {
                #fill: #ccc;  /* rgba(0,0,0,0.5); */
                fill: rgba(0,0,0,0.2);
                stroke: black;
                stroke-width: 0;
            }

            .gamepad-button.pressed {
                fill: #c00;
            }
        </style>
        <script src="svg-shapes.js"></script>
    </head>
    <body>
        <svg viewBox="0 0 800 400" id="overlayRoot">
        </svg>
        <script defer>
            // TODO: fix variable pollution
            let radius = 30;
            let extents = {x: radius, y: radius};
            let analogRadius = radius * Math.SQRT2; // distance from center to corner of a cell
            let legendOffset = (analogRadius - radius) / 2;
            let dpadCenter = {x:radius*3+2, y:radius*3+2};

            const context = new SvgContext(document.getElementById('overlayRoot'));

            const dpad = new Cross({context, cellExtent: radius});
            const dpadEntity = dpad.appendEntity({
                center: dpadCenter,
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}]
                
            });

            const dpadButton = new Shape({context, extents, shapeType: ShapeType.RECTANGLE});
            dpadButton.appendEntity({  // up button
                target: dpadEntity.group,
                center: dpad.north.center,
                layers: [{classes:"gamepad-button"}],
            });
            new Shape({  // up legend
                context,
                extents: {x: extents.x / 2, y: extents.y / 2},
                shapeType: ShapeType.TRIANGLE_UP
            }).appendEntity({
                target: dpadEntity.group,
                center: {x: dpad.north.center.x, y: dpad.north.center.y - legendOffset},
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}],
            });

            dpadButton.appendEntity({  // down button
                target: dpadEntity.group,
                center: dpad.south.center,
                layers: [{classes:"gamepad-button"}],
            });
            new Shape({  // down legend
                context,
                extents: {x: extents.x / 2, y: extents.y / 2},
                shapeType: ShapeType.TRIANGLE_DOWN
            }).appendEntity({
                target: dpadEntity.group,
                center: {x: dpad.south.center.x, y: dpad.south.center.y + legendOffset},
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}],
            });

            dpadButton.appendEntity({  // left button
                target: dpadEntity.group,
                center: dpad.west.center,
                layers: [{classes:"gamepad-button"}],
            });
            new Shape({  // left legend
                context,
                extents: {x: extents.x / 2, y: extents.y / 2},
                shapeType: ShapeType.TRIANGLE_LEFT
            }).appendEntity({
                target: dpadEntity.group,
                center: {x: dpad.west.center.x - legendOffset, y: dpad.west.center.y},
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}],
            });

            const rightEntity = dpadButton.appendEntity({  // right button
                target: dpadEntity.group,
                center: dpad.east.center,
                layers: [{classes:"gamepad-button"}],
            });
            const rightGroup = rightEntity.container;
            const rightLegend = new Shape({  // right legend
                context,
                extents: {x: extents.x / 2, y: extents.y / 2},
                shapeType: ShapeType.TRIANGLE_RIGHT
            })
            rightLegend.appendEntity({
                target: dpadEntity.group,
                center: {x: dpad.east.center.x + legendOffset, y: dpad.east.center.y},
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}],
            });

            const centerButton = new Shape({
                context,
                extents: {x: analogRadius, y: analogRadius},
                shapeType: ShapeType.ELLIPSE
            });
            const centerEntity = centerButton.appendEntity({
                target: dpadEntity.container,
                center: dpad.origin.center,
                layers: [{classes:"outer-border", cutout:true}, {classes:"inner-border", cutout:true}, {classes:"gamepad-button"}],
            });

            // only works this way because the shape itself and its position on the dpad are both centered
            // if not, a different mask would need to be created
            dpadEntity.group.setAttribute("mask", `url(#${centerEntity.maskId})`);
        </script>
    </body>
</html>
