<!DOCTYPE html>
<html>
    <head>
        <title>Gamepad Overlay</title>
        <style>
            body {
                background: black;
            }

            #overlayRoot {
                /* border: 1px solid red; */
                --btn-idle: rgba(44, 47, 51, 0.7);
                --btn-pressed: #3f8cff;
                --overlay-border-inner-size: 4;
                --overlay-border-outer-size: 4;
            }

            .outer-border {
                fill: none;
                stroke: white;
                stroke-width: calc((var(--overlay-border-inner-size) + var(--overlay-border-outer-size)) * 2px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .inner-border {
                fill: none;
                stroke: black;
                stroke-width: calc(var(--overlay-border-inner-size) * 2px);
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            .gamepad-button {
                fill: var(--btn-idle, rgba(0,0,0,0.2));
                stroke: black;
                stroke-width: 0;
            }

            .gamepad-button-pressed-fill {
                fill: var(--btn-pressed, #c00);
                stroke: none;
            }

            #overlayRoot [data-role="analog-area"] {
                --btn-idle: black;
            }

            #overlayRoot.theme-xbox [data-side="right"][data-role="up"] {
                --btn-idle: #5f5f1f;
                --btn-pressed: #ffff33;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="right"] {
                --btn-idle: #5f1f1f;
                --btn-pressed: #ff3333;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="left"] {
                --btn-idle: #1f1f5f;
                --btn-pressed: #3377ff;
            }
            #overlayRoot.theme-xbox [data-side="right"][data-role="down"] {
                --btn-idle: #1f4f20;
                --btn-pressed: #3fcf3f;
            }

            #overlayRoot.theme-snes [data-side="right"][data-role="up"] {
                --btn-idle: #20204f;
                --btn-pressed: #5555ff;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="right"] {
                --btn-idle: #4f2020;
                --btn-pressed: #ff5555;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="down"] {
                --btn-idle: #4f4f20;
                --btn-pressed: #ffff55;
            }
            #overlayRoot.theme-snes [data-side="right"][data-role="left"] {
                --btn-idle: #204f20;
                --btn-pressed: #55ff55;
            }
        </style>
        <script src="svg-shapes.js"></script>
    </head>
    <body>
        <svg id="overlayRoot" class="theme-xbox">
        </svg>
        <script defer>
            const context = new SvgContext(document.getElementById('overlayRoot'));
            const overlay = new GamepadOverlay({
                context,
                buttonLength: 132,
                buttonWidth: 132,
                topLeft: new Vector2({x: 0, y: 0}),
                gap: 1,
                betweenHalvesGap: 0,
                digitalThreshold: 0.55,
                hasAnalogStick: true,
                /*leftSide: {
                    cornerButtons: {
                        leftTrigger: {
                            pressMode: "digital",
                        },
                    },
                },
                rightSide: {
                    cornerButtons: {
                        rightTrigger: {
                            pressMode: "digital",
                        },
                    },
                },*/
            });
            const overlayRegion = overlay.region;
            context.svg.setAttribute(
                "viewBox",
                `${overlayRegion.topLeft.x} ${overlayRegion.topLeft.y} ${overlay.width} ${overlay.height}`,
            );
            context.svg.setAttribute("width", String(overlay.width));
            context.svg.setAttribute("height", String(overlay.height));

            const leftStick = overlay.entities.left.entities.analogStick;
            const rightStick = overlay.entities.right.entities.analogStick;
            const leftStickRing = overlay.entities.left.entities.analogStickRing;
            const rightStickRing = overlay.entities.right.entities.analogStickRing;
            const rightTrigger = overlay.entities.right.entities.rightTrigger;
            const leftTrigger = overlay.entities.left.entities.leftTrigger;
            leftStick.setPressFillDirection(PressFillDirection.OUTWARD).enablePressVisual();
            rightStick.setPressFillDirection(PressFillDirection.OUTWARD).enablePressVisual();
            leftStickRing.bringLayersToFront();
            rightStickRing.bringLayersToFront();

            const QUERY = new URLSearchParams(window.location.search);
            const INPUT_SOURCE = (() => {
                const source = (QUERY.get("source") || "browser").toLowerCase();
                if (source === "ws") {
                    return "websocket";
                }
                return ["browser", "websocket", "demo"].includes(source)
                    ? source
                    : "browser";
            })(); // ?source=browser|websocket|demo (or ws)
            const WS_URL = "ws://localhost:8765/gamepad-overlay";
            const DEADZONE_MODE = "none"; // "none" | "fixed"
            const FIXED_DEADZONE = 0.0;
            const BROWSER_POLL_HZ = Math.max(1, Number.parseInt(QUERY.get("poll") || "240", 10));
            const BROWSER_POLL_MS = Math.max(1, Math.round(1000 / BROWSER_POLL_HZ));
            const SHOW_STATUS = QUERY.get("status") === "1" || QUERY.get("debug") === "1";
            const STATUS_VERBOSE = QUERY.get("statusVerbose") === "1" || QUERY.get("debug") === "1";

            const sourceStatus = {
                source: INPUT_SOURCE.toUpperCase(),
                pad: "WAIT",
                connected: false,
                lastUpdateMs: 0,
            };
            let lastAppliedState = null;
            let queuedState = null;
            let renderScheduled = false;

            const EMPTY_STATE = Object.freeze({
                A: 0, B: 0, X: 0, Y: 0,
                SELECT: 0, START: 0, GUIDE: 0,
                LB: 0, RB: 0, LS: 0, RS: 0,
                LX: 0, LY: 0, RX: 0, RY: 0,
                LT: 0, RT: 0,
                DX: 0, DY: 0,
            });

            const rightButtons = {
                up: overlay.entities.right.entities.upButton,
                left: overlay.entities.right.entities.leftButton,
                down: overlay.entities.right.entities.downButton,
                right: overlay.entities.right.entities.rightButton,
            };

            const digitalInputMap = {
                A: rightButtons.down,
                B: rightButtons.right,
                X: rightButtons.left,
                Y: rightButtons.up,
                SELECT: overlay.entities.left.entities.select,
                START: overlay.entities.right.entities.start,
                LB: overlay.entities.left.entities.leftBumper,
                RB: overlay.entities.right.entities.rightBumper,
                LS: leftStick,
                RS: rightStick,
                DX_NEG: overlay.entities.left.entities.leftButton,
                DX_POS: overlay.entities.left.entities.rightButton,
                DY_NEG: overlay.entities.left.entities.upButton,
                DY_POS: overlay.entities.left.entities.downButton,
            };

            function clamp01(value) {
                return Math.max(0, Math.min(1, Number(value) || 0));
            }
            function clamp11(value) {
                return Math.max(-1, Math.min(1, Number(value) || 0));
            }
            function applyDeadzone(value) {
                value = clamp11(value);
                if (DEADZONE_MODE === "none") {
                    return value;
                }
                return Math.abs(value) < FIXED_DEADZONE ? 0 : value;
            }
            function normalizeState(partial) {
                const state = {...EMPTY_STATE, ...partial};
                state.A = clamp01(state.A);
                state.B = clamp01(state.B);
                state.X = clamp01(state.X);
                state.Y = clamp01(state.Y);
                state.SELECT = clamp01(state.SELECT);
                state.START = clamp01(state.START);
                state.GUIDE = clamp01(state.GUIDE);
                state.LB = clamp01(state.LB);
                state.RB = clamp01(state.RB);
                state.LS = clamp01(state.LS);
                state.RS = clamp01(state.RS);
                state.LT = clamp01(state.LT);
                state.RT = clamp01(state.RT);
                state.LX = applyDeadzone(state.LX);
                state.LY = applyDeadzone(state.LY);
                state.RX = applyDeadzone(state.RX);
                state.RY = applyDeadzone(state.RY);
                state.DX = Math.sign(clamp11(state.DX));
                state.DY = Math.sign(clamp11(state.DY));
                return state;
            }

            function hasMeaningfulStateChange(nextState, prevState) {
                if (prevState == null) {
                    return true;
                }
                const EPSILON = 0.0005;
                for (const [key, value] of Object.entries(nextState)) {
                    const previousValue = prevState[key];
                    if (Math.abs(value - previousValue) > EPSILON) {
                        return true;
                    }
                }
                return false;
            }

            function applyNormalizedState(state) {
                lastAppliedState = state;
                sourceStatus.lastUpdateMs = performance.now();

                leftStick.setTranslation(clampNormalizedOffsetToEllipse({
                    offset: {x: state.LX, y: state.LY},
                    halfSize: overlay.leftAnalogClampHalfSize,
                }));
                rightStick.setTranslation(clampNormalizedOffsetToEllipse({
                    offset: {x: state.RX, y: state.RY},
                    halfSize: overlay.rightAnalogClampHalfSize,
                }));

                leftTrigger.setInputAmount(state.LT);
                rightTrigger.setInputAmount(state.RT);
                leftStick.setInputAmount(state.LS);
                rightStick.setInputAmount(state.RS);

                digitalInputMap.A?.setInputAmount(state.A);
                digitalInputMap.B?.setInputAmount(state.B);
                digitalInputMap.X?.setInputAmount(state.X);
                digitalInputMap.Y?.setInputAmount(state.Y);
                digitalInputMap.SELECT?.setInputAmount(state.SELECT);
                digitalInputMap.START?.setInputAmount(state.START);
                digitalInputMap.LB?.setInputAmount(state.LB);
                digitalInputMap.RB?.setInputAmount(state.RB);
                digitalInputMap.DX_NEG?.setInputAmount(state.DX < 0 ? 1 : 0);
                digitalInputMap.DX_POS?.setInputAmount(state.DX > 0 ? 1 : 0);
                digitalInputMap.DY_NEG?.setInputAmount(state.DY < 0 ? 1 : 0);
                digitalInputMap.DY_POS?.setInputAmount(state.DY > 0 ? 1 : 0);
            }

            function scheduleApplyState(state) {
                queuedState = state;
                if (renderScheduled) {
                    return;
                }
                renderScheduled = true;
                requestAnimationFrame(() => {
                    renderScheduled = false;
                    if (queuedState == null) {
                        return;
                    }
                    applyNormalizedState(queuedState);
                    queuedState = null;
                });
            }

            function applyState(incomingState) {
                const state = normalizeState(incomingState);
                if (!hasMeaningfulStateChange(state, lastAppliedState)) {
                    return false;
                }
                scheduleApplyState(state);
                return true;
            }

            function createStatusOverlay() {
                if (!SHOW_STATUS) {
                    return null;
                }
                const leftSpecialRegion = overlay.leftLayout.bottomRight;
                const rightSpecialRegion = overlay.rightLayout.bottomLeft;
                const innerBorder = Number.parseFloat(getComputedStyle(context.svg).getPropertyValue("--overlay-border-inner-size")) || 1;
                const outerBorder = Number.parseFloat(getComputedStyle(context.svg).getPropertyValue("--overlay-border-outer-size")) || 1;
                const edgeInset = (innerBorder + outerBorder) * 2 + 2;

                const bayLeft = leftSpecialRegion.topLeft.x + edgeInset;
                const bayTop = Math.min(leftSpecialRegion.topLeft.y, rightSpecialRegion.topLeft.y) + edgeInset;
                const bayRight = rightSpecialRegion.bottomRight.x - edgeInset;
                const bayBottom = Math.max(leftSpecialRegion.bottomRight.y, rightSpecialRegion.bottomRight.y) - edgeInset;
                const bayWidth = Math.max(24, bayRight - bayLeft);
                const bayHeight = Math.max(16, bayBottom - bayTop);
                const x = bayLeft;
                const y = bayTop;

                const group = context.addChild(createSvgElement("g", {id: "statusOverlayGroup"}));
                const background = context.addChild(createSvgElement("rect", {
                    x,
                    y,
                    width: 1,
                    height: 1,
                    rx: 8,
                    ry: 8,
                    fill: "rgba(0, 0, 0, 0.55)",
                    stroke: "rgba(255,255,255,0.55)",
                    "stroke-width": 1,
                }), {parent: group});

                const line1 = context.addChild(createSvgElement("text", {
                    x: 0,
                    y: 0,
                    fill: "#d8dde2",
                    "font-size": STATUS_VERBOSE ? 10 : 11,
                    "font-family": "monospace",
                    "dominant-baseline": "hanging",
                }), {parent: group});
                const line2 = STATUS_VERBOSE
                    ? context.addChild(createSvgElement("text", {
                        x: 0,
                        y: 0,
                        fill: "#d8dde2",
                        "font-size": 9,
                        "font-family": "monospace",
                        "dominant-baseline": "hanging",
                    }), {parent: group})
                    : null;

                // Measure real text bounds to size box without magic widths.
                line1.textContent = "SRC WEBSOCKET | PAD WAIT";
                if (line2) {
                    line2.textContent = "LINK DOWN";
                }
                const measure1 = line1.getBBox();
                const measure2 = line2 ? line2.getBBox() : null;
                const measuredWidth = Math.max(
                    measure1.width,
                    measure2?.width ?? 0,
                );
                const paddingX = 8;
                const paddingTop = STATUS_VERBOSE ? 4 : 3;
                const paddingBottom = STATUS_VERBOSE ? 4 : 3;
                const lineGap = STATUS_VERBOSE ? 3 : 0;
                const linesHeight = measure1.height + (measure2 ? lineGap + measure2.height : 0);

                const width = Math.min(bayWidth, Math.max(24, measuredWidth + paddingX * 2));
                const height = Math.min(bayHeight, Math.max(16, linesHeight + paddingTop + paddingBottom));
                const centeredX = bayLeft + (bayWidth - width) / 2;
                const centeredY = bayTop + (bayHeight - height) / 2;
                const textLeft = centeredX + paddingX;
                const extraVerticalSpace = Math.max(0, height - (paddingTop + linesHeight + paddingBottom));
                const line1Y = centeredY + paddingTop + extraVerticalSpace / 2;

                setAttributes(background, {
                    x: centeredX,
                    y: centeredY,
                    width,
                    height,
                });
                setAttributes(line1, {
                    x: textLeft,
                    y: line1Y,
                });
                if (line2) {
                    setAttributes(line2, {
                        x: textLeft,
                        y: line1Y + measure1.height + lineGap,
                    });
                }

                return {
                    line1,
                    line2,
                    background,
                    bay: {left: bayLeft, top: bayTop, width: bayWidth, height: bayHeight},
                    padding: {x: paddingX, top: paddingTop, bottom: paddingBottom, lineGap},
                };
            }

            const statusOverlay = createStatusOverlay();

            function updateStatusOverlay() {
                if (statusOverlay == null) {
                    return;
                }
                statusOverlay.line1.textContent = `SRC ${sourceStatus.source} | PAD ${sourceStatus.pad}`;
                if (statusOverlay.line2) {
                    statusOverlay.line2.textContent = `LINK ${sourceStatus.connected ? "UP" : "DOWN"}`;
                }

                const measure1 = statusOverlay.line1.getBBox();
                const measure2 = statusOverlay.line2 ? statusOverlay.line2.getBBox() : null;
                const measuredWidth = Math.max(measure1.width, measure2?.width ?? 0);
                const linesHeight = measure1.height + (measure2 ? statusOverlay.padding.lineGap + measure2.height : 0);
                const width = Math.min(
                    statusOverlay.bay.width,
                    Math.max(24, measuredWidth + statusOverlay.padding.x * 2),
                );
                const height = Math.min(
                    statusOverlay.bay.height,
                    Math.max(16, linesHeight + statusOverlay.padding.top + statusOverlay.padding.bottom),
                );
                const x = statusOverlay.bay.left + (statusOverlay.bay.width - width) / 2;
                const y = statusOverlay.bay.top + (statusOverlay.bay.height - height) / 2;
                const extraVerticalSpace = Math.max(0, height - (
                    statusOverlay.padding.top + linesHeight + statusOverlay.padding.bottom
                ));
                const line1Y = y + statusOverlay.padding.top + extraVerticalSpace / 2;
                const textX = x + statusOverlay.padding.x;

                setAttributes(statusOverlay.background, {x, y, width, height});
                setAttributes(statusOverlay.line1, {x: textX, y: line1Y});
                if (statusOverlay.line2) {
                    setAttributes(statusOverlay.line2, {
                        x: textX,
                        y: line1Y + measure1.height + statusOverlay.padding.lineGap,
                    });
                }
            }

            function startStatusOverlayUpdates() {
                if (statusOverlay == null) {
                    return;
                }
                function tick() {
                    updateStatusOverlay();
                    setTimeout(tick, 250);
                }
                setTimeout(tick, 250);
            }

            function mapBrowserGamepadToState(gamepad) {
                if (!gamepad) {
                    return EMPTY_STATE;
                }
                const b = gamepad.buttons;
                const a = gamepad.axes;
                const up = clamp01(b[12]?.value ?? 0);
                const down = clamp01(b[13]?.value ?? 0);
                const left = clamp01(b[14]?.value ?? 0);
                const right = clamp01(b[15]?.value ?? 0);

                return {
                    A: clamp01(b[0]?.value ?? 0),
                    B: clamp01(b[1]?.value ?? 0),
                    X: clamp01(b[2]?.value ?? 0),
                    Y: clamp01(b[3]?.value ?? 0),
                    LB: clamp01(b[4]?.value ?? 0),
                    RB: clamp01(b[5]?.value ?? 0),
                    LT: clamp01(b[6]?.value ?? 0),
                    RT: clamp01(b[7]?.value ?? 0),
                    SELECT: clamp01(b[8]?.value ?? 0),
                    START: clamp01(b[9]?.value ?? 0),
                    LS: clamp01(b[10]?.value ?? 0),
                    RS: clamp01(b[11]?.value ?? 0),
                    GUIDE: clamp01((b[16]?.value ?? b[17]?.value) ?? 0),
                    LX: clamp11(a[0] ?? 0),
                    LY: clamp11(a[1] ?? 0),
                    RX: clamp11(a[2] ?? 0),
                    RY: clamp11(a[3] ?? 0),
                    DX: right - left,
                    DY: down - up,
                };
            }

            function startBrowserSource() {
                sourceStatus.connected = true;
                let lastTimestamp = null;
                let pollTimer = null;

                function stopPolling() {
                    if (pollTimer != null) {
                        clearTimeout(pollTimer);
                        pollTimer = null;
                    }
                }

                function scheduleNextTick() {
                    pollTimer = setTimeout(tick, BROWSER_POLL_MS);
                }

                function tick() {
                    const gamepads = navigator.getGamepads?.() ?? [];
                    const gamepad = gamepads[0] ?? null;
                    sourceStatus.pad = gamepad ? "OK" : "WAIT";
                    if (!gamepad) {
                        applyState(EMPTY_STATE);
                        scheduleNextTick();
                        return;
                    }

                    if (typeof gamepad.timestamp === "number" && Number.isFinite(gamepad.timestamp)) {
                        if (lastTimestamp !== null && gamepad.timestamp === lastTimestamp) {
                            scheduleNextTick();
                            return;
                        }
                        lastTimestamp = gamepad.timestamp;
                    }

                    applyState(mapBrowserGamepadToState(gamepad));
                    scheduleNextTick();
                }

                window.addEventListener("gamepadconnected", () => {
                    sourceStatus.connected = true;
                    sourceStatus.pad = "OK";
                    if (pollTimer == null) {
                        scheduleNextTick();
                    }
                });
                window.addEventListener("gamepaddisconnected", () => {
                    sourceStatus.pad = "DISC";
                    const gamepads = navigator.getGamepads?.() ?? [];
                    if (!gamepads[0]) {
                        sourceStatus.connected = false;
                        applyState(EMPTY_STATE);
                    }
                });

                stopPolling();
                scheduleNextTick();
            }

            function startWebSocketSource() {
                let retryDelay = 1000;
                const maxDelay = 10000;

                function connect() {
                    const ws = new WebSocket(WS_URL);
                    let firstMessage = true;

                    ws.onopen = () => {
                        sourceStatus.connected = true;
                        sourceStatus.pad = "WAIT";
                        retryDelay = 1000;
                    };

                    ws.onmessage = (event) => {
                        if (firstMessage) {
                            firstMessage = false;
                            return;
                        }
                        try {
                            applyState(JSON.parse(event.data));
                            sourceStatus.pad = "OK";
                        } catch {
                            applyState(EMPTY_STATE);
                            sourceStatus.pad = "ERR";
                        }
                    };

                    ws.onclose = () => {
                        sourceStatus.connected = false;
                        sourceStatus.pad = "DISC";
                        applyState(EMPTY_STATE);
                        setTimeout(connect, retryDelay);
                        retryDelay = Math.min(retryDelay * 2, maxDelay);
                    };

                    ws.onerror = () => {
                        ws.close();
                    };
                }

                connect();
            }

            function startRandomizedInputDemo() {
                sourceStatus.connected = true;
                sourceStatus.pad = "OK";
                const leftButtonHoldFrames = {up: 0, left: 0, down: 0, right: 0};
                const rightButtonHoldFrames = {up: 0, left: 0, down: 0, right: 0};
                const cornerButtonHoldFrames = {LB: 0, RB: 0, SELECT: 0, START: 0};
                const leftStickState = {x: 0, y: 0, targetX: 0, targetY: 0};
                const rightStickState = {x: 0, y: 0, targetX: 0, targetY: 0};
                const triggerState = {left: {value: 0, target: 0}, right: {value: 0, target: 0}};

                function holdPulse(holdMap, key, chance = 0.985) {
                    if (holdMap[key] > 0) {
                        holdMap[key] -= 1;
                        return 1;
                    }
                    if (Math.random() > chance) {
                        holdMap[key] = 12 + Math.floor(Math.random() * 16);
                        return 1;
                    }
                    return 0;
                }

                function animate() {
                    if (Math.random() > 0.96) {
                        leftStickState.targetX = Math.random() * 2 - 1;
                        leftStickState.targetY = Math.random() * 2 - 1;
                        rightStickState.targetX = Math.random() * 2 - 1;
                        rightStickState.targetY = Math.random() * 2 - 1;
                    }
                    leftStickState.x += (leftStickState.targetX - leftStickState.x) * 0.09;
                    leftStickState.y += (leftStickState.targetY - leftStickState.y) * 0.09;
                    rightStickState.x += (rightStickState.targetX - rightStickState.x) * 0.09;
                    rightStickState.y += (rightStickState.targetY - rightStickState.y) * 0.09;

                    if (Math.random() > 0.965) {
                        triggerState.left.target = Math.random();
                        triggerState.right.target = Math.random();
                    }
                    triggerState.left.value += (triggerState.left.target - triggerState.left.value) * 0.14;
                    triggerState.right.value += (triggerState.right.target - triggerState.right.value) * 0.14;

                    applyState({
                        LX: leftStickState.x,
                        LY: leftStickState.y,
                        RX: rightStickState.x,
                        RY: rightStickState.y,
                        LT: triggerState.left.value,
                        RT: triggerState.right.value,
                        LS: Math.min(1, Math.hypot(leftStickState.x, leftStickState.y)),
                        RS: Math.min(1, Math.hypot(rightStickState.x, rightStickState.y)),
                        A: holdPulse(rightButtonHoldFrames, "down"),
                        B: holdPulse(rightButtonHoldFrames, "right"),
                        X: holdPulse(rightButtonHoldFrames, "left"),
                        Y: holdPulse(rightButtonHoldFrames, "up"),
                        SELECT: holdPulse(cornerButtonHoldFrames, "SELECT", 0.992),
                        START: holdPulse(cornerButtonHoldFrames, "START", 0.992),
                        LB: holdPulse(cornerButtonHoldFrames, "LB", 0.992),
                        RB: holdPulse(cornerButtonHoldFrames, "RB", 0.992),
                        DX: holdPulse(leftButtonHoldFrames, "right") - holdPulse(leftButtonHoldFrames, "left"),
                        DY: holdPulse(leftButtonHoldFrames, "down") - holdPulse(leftButtonHoldFrames, "up"),
                    });

                    requestAnimationFrame(animate);
                }

                requestAnimationFrame(animate);
            }

            if (INPUT_SOURCE === "websocket") {
                startWebSocketSource();
            } else if (INPUT_SOURCE === "browser") {
                startBrowserSource();
            } else {
                startRandomizedInputDemo(); // comment out by switching INPUT_SOURCE
            }
            // Force an explicit zero-state render immediately to avoid any
            // first-frame visual flashes before the source loop starts.
            applyNormalizedState(normalizeState(EMPTY_STATE));
            startStatusOverlayUpdates();
        </script>
    </body>
</html>
