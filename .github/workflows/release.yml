name: Build Release Archives

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+|-alpha\.[0-9]+|-beta\.[0-9]+)?$ ]]; then
            echo "Unsupported release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

  build-linux:
    name: Build Linux Archive
    runs-on: ubuntu-22.04
    needs: validate-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-2.0-0

      - name: Build release archive
        run: |
          chmod +x build.sh
          ./build.sh "$GITHUB_REF_NAME"

      - name: Upload Linux archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: gamepad-overlay-${{ github.ref_name }}-linux-x64
          path: release/gamepad-overlay-${{ github.ref_name }}-linux-x64.tar.gz

  build-windows:
    name: Build Windows Archive
    runs-on: windows-2025
    needs: validate-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Build release archive
        shell: pwsh
        run: |
          ./build.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Upload Windows archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: gamepad-overlay-${{ github.ref_name }}-windows-x64
          path: release/gamepad-overlay-${{ github.ref_name }}-windows-x64.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-linux
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Install release dependencies
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create or update release
        run: |
          mapfile -t assets < <(find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) | sort)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          prerelease_flag=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              "${prerelease_flag[@]}"
          fi
