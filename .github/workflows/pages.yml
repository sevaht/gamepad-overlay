name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'src/gamepad_server/overlay_assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/gamepad_server/overlay_assets

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
