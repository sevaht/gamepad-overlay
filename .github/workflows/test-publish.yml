name: Test Publish (TestPyPI)

# Manual-only: verify OIDC trusted publishing of the Python package end-to-end
# against TestPyPI without cutting a real release. Production publishing (PyPI +
# platform binaries + GitHub release) lives in release.yml and runs on tags.
# Only the Python wheel/sdist is published here; binaries are not.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    env:
      # TestPyPI rejects PEP 440 local version segments (the "+g<sha>" that
      # hatch-vcs adds to untagged commits) and duplicate versions. Pin a
      # clean, unique dev version per run instead of deriving one from git.
      SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0.dev${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: testpypi-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # required for OIDC trusted publishing
    environment: testpypi

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: testpypi-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
