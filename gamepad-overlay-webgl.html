<!DOCTYPE html>
<html>
    <head>
        <title>Gamepad Overlay WebGL</title>
        <style>
            body {
                margin: 0;
                background: transparent;
            }
            #overlayWebgl {
                display: block;
                background: transparent;
            }
        </style>
        <script src="svg-shapes.js"></script>
        <script src="gamepad-input-sources.js"></script>
        <script src="gamepad-overlay-raster-common.js"></script>
        <script src="gamepad-overlay-webgl.js"></script>
    </head>
    <body>
        <canvas id="overlayWebgl"></canvas>
        <script defer>
            const QUERY = new URLSearchParams(window.location.search);
            const INPUT_SOURCE = (() => {
                const source = (QUERY.get("source") || "websocket").toLowerCase();
                if (source === "ws") {
                    return "websocket";
                }
                return ["browser", "websocket", "demo"].includes(source) ? source : "browser";
            })();

            const model = createRasterOverlayModel({buttonLength: 132, buttonWidth: 132, borderWidth: 8, gap: 1, betweenHalvesGap: 0});
            const renderer = new WebGLGamepadOverlayRenderer({
                canvas: document.getElementById("overlayWebgl"),
                model,
                maxFps: Number.parseInt(QUERY.get("maxFps") || "0", 10),
                debugPerf: QUERY.get("debugPerf") === "1",
            });

            const source = createGamepadSource({
                mode: INPUT_SOURCE,
                wsUrl: `ws://${QUERY.get("wsHost") || "localhost"}:8765/gamepad-overlay`,
                pollMs: Math.max(1, Math.round(1000 / Math.max(1, Number.parseInt(QUERY.get("poll") || "240", 10)))),
                padIndex: QUERY.get("padIndex") == null ? null : Math.max(0, Number.parseInt(QUERY.get("padIndex"), 10) || 0),
                padIdContains: (QUERY.get("padIdContains") || "").trim(),
                padRequireStandard: QUERY.get("padRequireStandard") === "1",
                listPads: QUERY.get("pads") === "1" || QUERY.get("listPads") === "1",
                onState: (state) => renderer.applyState(state),
                onStatus: () => {},
            });
            source.start();
        </script>
    </body>
</html>
